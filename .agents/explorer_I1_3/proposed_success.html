<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신청 완료</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f6fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .success-icon {
            font-size: 60px;
            color: #2ec4b6;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #111;
        }
        p {
            font-size: 15px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        #status {
            display: inline-block;
            background-color: #e6fcf5;
            color: #0ca678;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #c3fae8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>신청 접수 완료</h1>
        <p>청년 맞춤형 전월세 대출 신청이 정상적으로 완료되었습니다.<br>접수 결과는 카카오톡으로 안내해 드립니다.</p>
        <div id="status">SUCCESS</div>
    </div>
</body>
</html>
