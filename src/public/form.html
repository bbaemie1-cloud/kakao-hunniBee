<!DOCTYPE html>
<html>
<head>
  <title>Youth Loan Application</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="tel"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
    }
    .checkbox-group label {
      margin-bottom: 0;
      margin-left: 8px;
    }
    .btn-group {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Youth Loan Application Form</h1>
  <form id="loan-form" action="/api/submit-form" method="POST">
    <input type="hidden" name="taskId" id="taskId">
    
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
      <label for="age">Age/SSN:</label>
      <input type="text" id="age" name="age" required>
    </div>

    <div class="form-group">
      <label for="phone">Phone:</label>
      <input type="tel" id="phone" name="phone" required>
    </div>

    <div class="form-group">
      <label for="amount">Loan Amount:</label>
      <input type="number" id="amount" name="amount" required>
    </div>

    <div class="form-group">
      <label for="deposit">Deposit Amount:</label>
      <input type="number" id="deposit" name="deposit" required>
    </div>

    <div class="form-group checkbox-group">
      <input type="checkbox" id="agree" name="agree" required>
      <label for="agree">I consent to the terms and conditions</label>
    </div>

    <div class="btn-group">
      <button type="submit" id="submit-btn">Submit</button>
    </div>
  </form>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('taskId');
    if (taskId) {
      document.getElementById('taskId').value = taskId;
    }
  </script>
</body>
</html>
