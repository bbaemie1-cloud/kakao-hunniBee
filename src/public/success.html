<!DOCTYPE html>
<html>
<head>
  <title>Application Success</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    h1 {
      text-align: center;
      color: green;
    }
    #status {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      padding: 10px;
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 4px;
    }
    .params-container {
      margin-top: 20px;
    }
    .param-item {
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h1>Application Submitted Successfully!</h1>
  <p>Your Youth Loan Application has been successfully submitted and verified.</p>
  
  <div id="status">Loading...</div>

  <div class="params-container">
    <h3>Submitted Parameters:</h3>
    <div id="query-params"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const container = document.getElementById('query-params');
    urlParams.forEach((value, key) => {
      const div = document.createElement('div');
      div.className = 'param-item';
      div.textContent = `${key}: ${value}`;
      container.appendChild(div);
    });

    const statusEl = document.getElementById('status');
    const taskId = urlParams.get('taskId');

    if (!taskId) {
      statusEl.textContent = 'Error: Missing taskId parameter';
      statusEl.style.backgroundColor = '#f8d7da';
      statusEl.style.color = '#721c24';
      statusEl.style.borderColor = '#f5c6cb';
    } else {
      fetch('/api/automation/status/' + taskId)
        .then(res => {
          if (!res.ok) {
            throw new Error('Failed to fetch status');
          }
          return res.json();
        })
        .then(data => {
          if (data.status === 'COMPLETED') {
            statusEl.textContent = 'SUCCESS - 완료';
            statusEl.style.backgroundColor = '#d4edda';
            statusEl.style.color = '#155724';
            statusEl.style.borderColor = '#c3e6cb';
          } else {
            statusEl.textContent = 'Error: Task is not completed (Current status: ' + data.status + ')';
            statusEl.style.backgroundColor = '#f8d7da';
            statusEl.style.color = '#721c24';
            statusEl.style.borderColor = '#f5c6cb';
          }
        })
        .catch(err => {
          statusEl.textContent = 'Error: ' + err.message;
          statusEl.style.backgroundColor = '#f8d7da';
          statusEl.style.color = '#721c24';
          statusEl.style.borderColor = '#f5c6cb';
        });
    }
  </script>
</body>
</html>
